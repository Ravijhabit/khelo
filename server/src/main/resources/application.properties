spring.application.name=ghost-coach
spring.profiles.active=local
server.port=8080

# H2 file-based database (zero install)
spring.datasource.url=jdbc:h2:file:./ghostcoach-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT
jwt.secret=${JWT_SECRET:ghostcoach-dev-secret-key-please-change-in-production-32chars}
jwt.expiration=86400000

# Gemini Vision API
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# File storage
storage.upload-dir=./uploads

# Logging — include requestId and userId from MDC on every line
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [req=%X{requestId:-N/A}] [user=%X{userId:-anon}] %logger{28} - %msg%n
logging.level.root=INFO
logging.level.com.ghostcoach=DEBUG
